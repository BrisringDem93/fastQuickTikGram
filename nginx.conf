# FastQuickTikGram – Nginx reverse-proxy configuration
# Handles routing between the Next.js frontend and FastAPI backend,
# and accommodates large video uploads (up to 600 MB).

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Upload size limit ───────────────────────────────────────────────
    # MAX_VIDEO_SIZE_MB=500; we set 600m here to accommodate multipart
    # framing overhead. Keep this value in sync with MAX_VIDEO_SIZE_MB.
    client_max_body_size 600m;

    # ── Shared proxy settings ───────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # Increase timeouts for long-running video-processing requests
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    proxy_connect_timeout 10s;

    # ── Backend API ─────────────────────────────────────────────────────
    # All paths starting with /api/ are forwarded to FastAPI.
    # The backend mounts its routers under /api/v1/..., so the prefix
    # is preserved (no rewrite).
    location /api/ {
        proxy_pass http://backend;
    }

    # FastAPI auto-generated docs & health check
    location ~ ^/(docs|redoc|openapi\.json|health)$ {
        proxy_pass http://backend;
    }

    # ── Next.js frontend ────────────────────────────────────────────────
    # Everything else goes to the Next.js app.
    location / {
        proxy_pass http://frontend;

        # WebSocket support for Next.js HMR in development
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static assets caching ───────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
