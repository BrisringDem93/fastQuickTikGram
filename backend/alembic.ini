# A generic, single database configuration.

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Naming convention for generated migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sqlalchemy.url is overridden programmatically in env.py from Settings.DATABASE_URL
# Leave a placeholder here for reference / offline tooling
sqlalchemy.url = postgresql+asyncpg://user:password@localhost/fastquicktikgram

# Timezone for the "Create Date" field in generated scripts
timezone = UTC

# Max length of auto-generated slug from the revision message
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8

[post_write_hooks]
# Optionally run black/ruff after generating a new revision:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
